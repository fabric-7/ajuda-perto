name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/site/**"
      - "docs/en/**"
      - "docs/pt-BR/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # Requires repository Settings > Pages > Source: GitHub Actions.
        # Auto-enablement requires a separate PAT/GitHub App token with Pages/admin permissions.
        uses: actions/configure-pages@v5

      - name: Prepare static site artifact
        run: |
          rm -rf .pages
          mkdir -p .pages
          cp -R docs/site/. .pages/
          cp -R docs/en .pages/en
          cp -R docs/pt-BR .pages/pt-BR

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
